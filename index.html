    <style>
        /* Full-screen image container */
        .image-and-welcome {
            position: relative;
            height: 100vh; /* Full height of the viewport */
            width: 100%; /* Full width of the viewport */
            overflow: hidden;
        }

        .image-and-welcome img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the image covers the screen while maintaining aspect ratio */
        }

        /* Text Styling for Top-Right Corner */
        .animated-text {
            position: absolute;
            top: 10%; /* Adjust position from the top */
            left: 10%; /* Adjust position from the right */
            color: white;
            font-size: 30px; /* Increased font size for visibility */
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
            opacity: 0;
            animation: fadeIn 2s forwards;
        }

        /* Animation Keyframes */
        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(-20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

<style>  
/* General reset */

body {

.footer {

.footer-container {

}

.footer-column {

.footer-column h4 {

.footer-column ul {

.footer-column ul li a {

}

.footer-column ul li a:hover {

}

.social-icons {

.social-icon {

.social-icon:hover {

}

.footer-bottom {
  background-color: #222;
  color: #aaa;
  text-align: center;
  padding: 20px 0;
  position: absolute;
  width: 100%;
  bottom: 0;
}

/* Vertical divider */
.divider {
  width: 1px;
  background-color: #555;

  margin: 0 20px;
}

@media (max-width: 768px) {

  }

  .divider {

  }

  .social-icons {

  }
}
