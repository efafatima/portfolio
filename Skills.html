<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Form with Skills</title>

  <style>
    /* General Body Styling */
    body {
      background-color: pink; /* Background color */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* Container for Form and Progress Bar */
    .main-container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
      padding: 20px;
      max-width: 600px;
      width: 100%;
    }

    /* Section Title */
    h2 {
      text-align: center;
      color: #343a40;
      margin-bottom: 20px;
    }

    /* Form Styling */
    .form-box {
      margin-bottom: 30px;
    }

    .form-box .form-control {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ced4da;
      border-radius: 5px;
    }

    .form-box .form-control:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }

    .form-box .btn {
      width: 100%;
      padding: 10px;
      border: none;
      background-color: #007bff;
      color: white;
      font-size: 1rem;
      border-radius: 5px;
      cursor: pointer;
    }

    .form-box .btn:hover {
      background-color: #0056b3;
    }

    /* Progress Bar Styling */
    .skill {
      margin-bottom: 15px;
    }

    .skill h4 {
      margin: 0 0 5px;
      font-size: 1rem;
      color: #343a40;
    }

    .progress {
      background-color: #e9ecef;
      border-radius: 5px;
      height: 20px;
      overflow: hidden;
    }

    .progress-bar {
      background-color: #007bff;
      color: white;
      height: 100%;
      text-align: center;
      line-height: 20px;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <div class="main-container">
   

    <!-- Progress Bar Section -->
    <div class="skills-box">
      <h2>My Skills</h2>
      <div class="skill">
        <h4>HTML</h4>
        <div class="progress">
          <div class="progress-bar" role="progressbar" style="width: 90%;" aria-valuenow="90" aria-valuemin="0" aria-valuemax="100">90%</div>
        </div>
      </div>
      <div class="skill">
        <h4>CSS</h4>
        <div class="progress">
          <div class="progress-bar" role="progressbar" style="width: 85%;" aria-valuenow="85" aria-valuemin="0" aria-valuemax="100">85%</div>
        </div>
      </div>
      <div class="skill">
        <h4>JavaScript</h4>
        <div class="progress">
          <div class="progress-bar" role="progressbar" style="width: 80%;" aria-valuenow="80" aria-valuemin="0" aria-valuemax="100">80%</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
